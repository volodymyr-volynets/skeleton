application.layouts.no_styles.footer = "no_styles"
application.layouts.no_styles.extra_forms = "no_styles"
application.layouts.no_styles.site = "vite_react_ts_6_2_0"

; iframe layout
application.layouts.iframe.name = "Numbers Applications: Iframe"
application.layouts.iframe.layout_type = "php"
application.layouts.iframe.layout_path = "/Layout/RevealIframe.template.php"

[development]
; template settings, legacy template set to false
;application.layout.use.layouts = true